<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .outerdiv{
            border:2px solid green;
            width: 800px;
            height: 500px;
            position: relative;
        }
        .innerdiv{
            border: 2px solid red;
            width: 400px;
            height: 300px;
            position: absolute;
            top: 50px;
            left: 100px;
        }
        .button{
            border: 2px solid blue;
            position: fixed;
            bottom: 200px;
            left: 100px;

        }
    </style>
</head>
<body>
    <div class="outerdiv">
        <div class="innerdiv">
            <button type="button" class="button"></button>

        </div>

    </div>
    
</body>
</html>
