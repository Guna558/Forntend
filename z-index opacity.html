
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-image</title>
    <style>
        
        .div2{
            position: absolute;
            height: 300px;
            width: 300px;
            z-index: 1;
            background-color: brown;
            top: 50px;
            right: 50px;

        }
        .div3{
            position:absolute;
            height: 300px;
            width: 300px;
            z-index: 2;
            background-color: aqua;
            top: 100px;
            right: 100px;
        }
          .div4{
            position:absolute;
            height: 300px;
            width: 300px;
            z-index: 3;
            background-color: green;
            top: 150px;
            right: 150px;
        }
    </style>

    

</head>
<body>
    <div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>

    </div>
    
</body>
</html>
