<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div2{
            background-color: blueviolet;
            height: 400px;
            width: 800px;
            
        
           
        }
        .div3{
            background-color: black;
            height: 100px;
            width: 100px;
        }

      
        @media  screen and (max-width:1024px) {
            .div2{
                background-color: blue;
        
                height:100%;
                width:100%;
            
            }
            
        }
        @media  screen and (max-width:770px) {
            .div2{
                background-color: aquamarine;
                height:100%;
                width: 100%;
            }
            
        }
        @media screen and (max-width:320) {
            .div2{
                background-color: gold;
                height: 100%;
                width:100%;
            }
            
        }
        
       
    </style>
</head>
<body>
    <div class="div2"></div>

    <div class="div3"></div>

   
        
    <div>
        
    <h1>
        Redo (Opposite of Undo)
Windows / Linux: Ctrl + Y (or Ctrl + Shift + Z in some apps)
Mac: Cmd + Shift + Z
🔹 Where it works
Text editors (Notepad, VS Code)
Browsers
MS Word / Excel
Coding tools (like Eclipse, IntelliJ)
🎯 Example

If you delete text accidentally:
👉 Press Ctrl + Z → text comes back

    </h1>
    </div>
